<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Rank Tracker Pro | Serper API</title>
    <style>
        /* Design 2026: Neo-Minimalism, Glassmorphism, Dark/Light adaptive */
        :root {
            --bg-color: #0f1115;
            --surface-color: rgba(255, 255, 255, 0.03);
            --surface-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        header {
            margin-bottom: 2rem;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-secondary);
        }

        .card {
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(12px);
            margin-bottom: 2rem;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .full-width {
            grid-column: span 2;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        input[type="text"], textarea, select {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--surface-border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        button:disabled {
            background-color: var(--surface-border);
            color: var(--text-secondary);
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid var(--surface-border);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.5rem;
        }

        .status {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        /* Table Styles */
        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid var(--surface-border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 1rem;
            border-bottom: 1px solid var(--surface-border);
        }

        th {
            background-color: rgba(0, 0, 0, 0.3);
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .pos-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.875rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.1);
        }

        .pos-top3 { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .pos-page1 { background: rgba(99, 102, 241, 0.2); color: #818cf8; }
        .pos-notfound { background: rgba(239, 68, 68, 0.2); color: #f87171; }

        .url-cell {
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-secondary);
        }
        
        .url-cell a {
            color: inherit;
            text-decoration: none;
        }

        .url-cell a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .actions { flex-direction: column; gap: 1rem; align-items: stretch; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Rank Tracker Pro</h1>
        <p class="subtitle">Monitoraggio SERP in tempo reale tramite Serper.dev</p>
    </header>

    <div class="card">
        <div class="form-grid">
            <div>
                <label for="domain">Dominio di interesse (es. tuo-sito.it)</label>
                <input type="text" id="domain" placeholder="tuo-sito.it" required>
            </div>
            
            <div>
                <label for="device">Dispositivo</label>
                <select id="device">
                    <option value="desktop">Desktop</option>
                    <option value="mobile">Mobile</option>
                    <option value="both">Entrambi (Desktop + Mobile)</option>
                </select>
            </div>

            <div>
                <label for="location">Luogo / Città (Opzionale, es. Rome, Italy)</label>
                <input type="text" id="location" placeholder="Lascia vuoto per ricerca nazionale">
            </div>

            <div style="display: flex; gap: 1rem;">
                <div style="flex: 1;">
                    <label for="gl">Paese (es. it)</label>
                    <input type="text" id="gl" value="it" placeholder="it">
                </div>
                <div style="flex: 1;">
                    <label for="hl">Lingua (es. it)</label>
                    <input type="text" id="hl" value="it" placeholder="it">
                </div>
            </div>

            <div class="full-width">
                <label for="keywords">Parole chiave (una per riga)</label>
                <textarea id="keywords" placeholder="ristorante roma&#10;miglior ristorante trastevere&#10;dove mangiare a roma"></textarea>
            </div>
        </div>

        <div class="actions">
            <div class="status" id="statusMessage">Pronto per il check.</div>
            <button id="startBtn" onclick="startTracking()">Avvia Analisi</button>
        </div>
    </div>

    <div class="card" id="resultsCard" style="display: none;">
        <div class="actions" style="margin-top: 0; margin-bottom: 1.5rem;">
            <h2 style="margin: 0; font-size: 1.25rem;">Risultati</h2>
            <button class="btn-secondary" onclick="exportCSV()">📥 Esporta in CSV</button>
        </div>
        
        <div class="table-container">
            <table id="resultsTable">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Keyword</th>
                        <th>Dispositivo</th>
                        <th>Posizione</th>
                        <th>URL Esatto in SERP</th>
                    </tr>
                </thead>
                <tbody id="resultsBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // CONFIGURAZIONE API KEY
    const API_KEY = "cdf1978c50f1c486d5d8eec153b3c21ec2f6ae47";

    async function startTracking() {
        const domain = document.getElementById('domain').value.trim().toLowerCase();
        const keywordsRaw = document.getElementById('keywords').value.trim();
        const deviceChoice = document.getElementById('device').value;
        const location = document.getElementById('location').value.trim();
        const gl = document.getElementById('gl').value.trim();
        const hl = document.getElementById('hl').value.trim();
        
        const btn = document.getElementById('startBtn');
        const status = document.getElementById('statusMessage');
        const resultsCard = document.getElementById('resultsCard');
        const tbody = document.getElementById('resultsBody');

        if (!domain || !keywordsRaw) {
            alert("Per favore, inserisci un dominio e almeno una parola chiave.");
            return;
        }

        // Pulisci e prepara le keyword
        const keywords = keywordsRaw.split('\n').map(k => k.trim()).filter(k => k.length > 0);
        
        // Setup UI per il caricamento
        btn.disabled = true;
        btn.innerHTML = "Analisi in corso... ⏳";
        resultsCard.style.display = "block";
        tbody.innerHTML = ""; // Svuota la tabella
        
        const dateStr = new Date().toLocaleString('it-IT', { dateStyle: 'short', timeStyle: 'short' });
        let totalChecks = deviceChoice === 'both' ? keywords.length * 2 : keywords.length;
        let completedChecks = 0;

        for (const keyword of keywords) {
            const devicesToRun = deviceChoice === 'both' ? ['desktop', 'mobile'] : [deviceChoice];
            
            for (const device of devicesToRun) {
                status.innerText = `Controllo: "${keyword}" su ${device}... (${completedChecks + 1}/${totalChecks})`;
                
                try {
                    // Prepara il payload per l'API di Serper
                    const payload = {
                        q: keyword,
                        gl: gl || "it",
                        hl: hl || "it",
                        num: 100 // Controlliamo fino a 100 risultati (prima pagina lunga o pagine successive)
                    };
                    
                    if (location) payload.location = location;
                    // Serper non ha un flag "device" ufficiale nella root, ma aggiungerlo nella custom search o appoggiarsi a standard.
                    // Per forzare risultati mobile, Serper attualmente non espone un parametro ufficiale per la web search, 
                    // ma possiamo passare il parametro per sicurezza se implementato nei loro aggiornamenti backend.
                    if (device === 'mobile') payload.device = 'mobile'; 

                    const response = await fetch('https://google.serper.dev/search', {
                        method: 'POST',
                        headers: {
                            'X-API-KEY': API_KEY,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });

                    const data = await response.json();
                    
                    // Ricerca del dominio nei risultati organici
                    let foundPosition = -1;
                    let foundUrl = "-";

                    if (data.organic && data.organic.length > 0) {
                        for (const result of data.organic) {
                            if (result.link && result.link.toLowerCase().includes(domain)) {
                                foundPosition = result.position;
                                foundUrl = result.link;
                                break; // Fermati al primo risultato trovato per quel dominio
                            }
                        }
                    }

                    appendResultRow(dateStr, keyword, device, foundPosition, foundUrl);

                } catch (error) {
                    console.error("Errore durante il recupero dei dati:", error);
                    appendResultRow(dateStr, keyword, device, "Errore API", "-");
                }
                
                completedChecks++;
            }
        }

        // Ripristina UI
        btn.disabled = false;
        btn.innerHTML = "Nuova Analisi";
        status.innerText = "Analisi completata con successo!";
    }

    function appendResultRow(date, keyword, device, position, url) {
        const tbody = document.getElementById('resultsBody');
        const tr = document.createElement('tr');
        
        // Creazione del badge della posizione
        let posHtml = "";
        if (position === -1) {
            posHtml = `<span class="pos-badge pos-notfound">> 100</span>`;
        } else if (typeof position === 'string') {
            posHtml = `<span class="pos-badge pos-notfound">Errore</span>`;
        } else if (position <= 3) {
            posHtml = `<span class="pos-badge pos-top3">${position}</span>`;
        } else if (position <= 10) {
            posHtml = `<span class="pos-badge pos-page1">${position}</span>`;
        } else {
            posHtml = `<span class="pos-badge" style="background: rgba(255,255,255,0.05);">${position}</span>`;
        }

        const urlHtml = url !== "-" ? `<a href="${url}" target="_blank" rel="noopener">${url}</a>` : "-";

        tr.innerHTML = `
            <td>${date}</td>
            <td style="font-weight: 500;">${keyword}</td>
            <td style="text-transform: capitalize;">${device}</td>
            <td>${posHtml}</td>
            <td class="url-cell" title="${url}">${urlHtml}</td>
        `;
        
        tbody.appendChild(tr);
    }

    function exportCSV() {
        const table = document.getElementById("resultsTable");
        let rows = table.querySelectorAll("tr");
        let csvContent = [];

        for (let i = 0; i < rows.length; i++) {
            let row = [];
            let cols = rows[i].querySelectorAll("td, th");
            
            for (let j = 0; j < cols.length; j++) {
                // Pulisce il testo dal formato HTML
                let data = cols[j].innerText.replace(/"/g, '""');
                // Se è la colonna posizione e contiene "> 100", salva solo quel testo
                if (data.includes("> 100")) data = "> 100";
                row.push('"' + data + '"');
            }
            csvContent.push(row.join(","));
        }

        const csvString = csvContent.join("\n");
        const blob = new Blob([csvString], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        
        link.setAttribute("href", url);
        link.setAttribute("download", `rank_tracker_export_${new Date().getTime()}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
